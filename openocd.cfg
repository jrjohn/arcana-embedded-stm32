# OpenOCD Configuration for STM32F103ZE
# SWD Interface with CMSIS-DAP (fireDAP/DAPLink)

# Interface: CMSIS-DAP
source [find interface/cmsis-dap.cfg]

# Transport: SWD
transport select swd

# Target: STM32F1x
source [find target/stm32f1x.cfg]

# Reset configuration
reset_config srst_only srst_nogate

# GDB configuration
gdb_port 3333
tcl_port 6666
telnet_port 4444
