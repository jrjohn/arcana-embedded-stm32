sonar.projectKey=stm32-app
sonar.projectName=STM32 App
sonar.projectVersion=1.0

# Sources to analyze — full first-party codebase across both STM32 targets
# (HAL/Drivers/Middlewares/Core stay excluded below as vendor-generated)
sonar.sources=Shared/Inc,Shared/Src,Targets/stm32f051c8/Services,Targets/stm32f103ze/Services
sonar.tests=Tests

# Explicitly list CXX file suffixes (sonar-cxx 2.x needs this; '-' default unreliable)
sonar.cxx.file.suffixes=.cpp,.cxx,.cc,.c++,.c,.hpp,.hxx,.hh,.h++,.h

# Include directories for CXX analysis
sonar.cxx.includeDirectories=\
  Shared/Inc,\
  Targets/stm32f051c8/Services/command,\
  Targets/stm32f051c8/Services/service,\
  Targets/stm32f051c8/Services/controller,\
  Tests/mocks

# Coverage: Cobertura XML (sonar-cxx 2.x; lcov converted via lcov_cobertura)
sonar.cxx.cobertura.reportPaths=coverage.xml

# Exclusions — only vendor/generated/third-party code is excluded from analysis.
# All first-party code (Services, ats, CryptoEngine, KeyExchangeManager) is
# IN-SCOPE: this is a defense-grade project and the real coverage baseline
# must be visible.
sonar.exclusions=\
  Targets/stm32f051c8/Drivers/**,\
  Targets/stm32f051c8/Middlewares/**,\
  Targets/stm32f051c8/Core/**,\
  Targets/stm32f103ze/Drivers/**,\
  Targets/stm32f103ze/Middlewares/**,\
  Targets/stm32f103ze/Core/**,\
  Tests/mocks/**,\
  Shared/Src/mbedtls/**,\
  Shared/Inc/mbedtls/**,\
  Shared/Src/nanopb/**,\
  Shared/Inc/nanopb/**,\
  Shared/Src/uECC.c,\
  Shared/Inc/uECC.h,\
  Shared/Inc/uECC_vli.h,\
  Shared/Src/arcana_cmd.pb.c,\
  Shared/Src/registration.pb.c,\
  Shared/Inc/arcana_cmd.pb.h,\
  Shared/Inc/registration.pb.h,\
  Shared/Src/*.inc

# Exclude tests/mocks from coverage METRIC denominator
# (we measure how well production code is tested, not the tests themselves)
sonar.coverage.exclusions=\
  Tests/**,\
  **/mocks/**

# Fix: sonarapple plugin claims *.h for ObjC — override to only match ObjC files
sonar.lang.patterns.objc=**/*.m,**/*.mm

sonar.scm.disabled=true
sonar.sourceEncoding=UTF-8
# stm32 coverage fix trigger

