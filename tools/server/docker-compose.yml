version: '3.8'

services:
  registration-api:
    build: .
    container_name: arcana-registration-api
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=5YzYziFT3g
      - MYSQL_DB=mqtt
      - MQTT_BROKER=arcana.boo
      - MQTT_PORT=8883
      - SERVER_SECRET=${SERVER_SECRET:-arcana-dev-secret-change-in-prod}
      - UPLOAD_DIR=/uploads
    volumes:
      - uploads:/uploads
      - /root/docker/mqtt/mosquitto/certs:/certs:ro,z
    networks:
      - mysql_default

volumes:
  uploads:

networks:
  mysql_default:
    external: true
