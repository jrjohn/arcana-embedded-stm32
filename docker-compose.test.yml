services:
  stm32-test:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: build
    volumes:
      - ./coverage.info:/workspace/coverage.info
    working_dir: /workspace
    command: >
      sh -c "
        cmake -S Tests -B Tests/build -G Ninja -DCMAKE_BUILD_TYPE=Debug &&
        cmake --build Tests/build -- -j$(nproc) &&
        cd Tests/build && ctest --output-on-failure || true &&
        cd /workspace &&
        lcov --capture --directory Tests/build --output-file coverage.info
             --rc lcov_branch_coverage=0 &&
        lcov --remove coverage.info '*googletest*' '/usr/*' '*/Tests/*' '*/mocks/*'
             --output-file coverage.info &&
        lcov --summary coverage.info
      "
