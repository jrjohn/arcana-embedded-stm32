# Repo-local arch-qube profile override for this repository.
#
# The arch-qube-bundled stm32 profile sets source_roots to
# "Targets/<mcu>/Services", which has never existed in this repo (the per-target
# application code lives under "Targets/<mcu>/Main"). With non-existent
# source_roots arch-qube falls back to scanning the WHOLE repo, which then flags
# vendored mbedtls (Shared/), host-side Tests/, and the DI container as spurious
# layer/Impl-import violations. This override restores the intended scan scope.
#
# It also lists AppContainer* as a DI container file (matching the bundled esp32
# profile), so the container wiring Impls is allowed — same as every other
# arcana client profile. No dependency rule is relaxed relative to the bundled
# profile; only the scan scope and DI-container recognition are corrected.
#
# Pointed at via `arch-qube scan ... --profiles tools/arch-qube` in the Jenkinsfile.
framework: stm32
platform: embedded
category: client

source_roots: ["Targets/stm32f103ze/Main", "Targets/stm32f051c8/Main"]
file_extensions: [".hpp", ".cpp", ".h"]

layers:
  - name: presentation
    paths: ["View/", "view/"]
  - name: viewmodel
    paths: ["ViewModel/"]
  - name: service
    paths: ["Service/", "service/"]
  - name: driver
    paths: ["Driver/", "driver/"]
  - name: controller
    paths: ["Controller/", "controller/"]
    is_shared: true
  - name: common
    paths: ["Common/", "command/"]
    is_shared: true

allowed_dependencies:
  presentation: [viewmodel, common]
  viewmodel: [service, common]
  service: [driver, common]
  driver: [common]
  controller: [service, viewmodel, presentation, common]

import_pattern: "#include\\s+[\"<]([^\"'>]+)[\"'>]"

di_container_files:
  - "**/AppContainer*"
  - "**/Controller.cpp"
  - "**/F103App.cpp"
  - "**/App.cpp"
