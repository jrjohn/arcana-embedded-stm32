sonar.projectKey=stm32-app
sonar.projectName=STM32 App
sonar.projectVersion=1.0

# Sources to analyze (shared headers + platform-independent services)
sonar.sources=Shared/Inc,Shared/Src,Targets/stm32f051c8/Services
sonar.tests=Tests

# Explicitly list CXX file suffixes (sonar-cxx 2.x needs this; '-' default unreliable)
sonar.cxx.file.suffixes=.cpp,.cxx,.cc,.c++,.c,.hpp,.hxx,.hh,.h++,.h

# Include directories for CXX analysis
sonar.cxx.includeDirectories=\
  Shared/Inc,\
  Targets/stm32f051c8/Services/command,\
  Targets/stm32f051c8/Services/service,\
  Targets/stm32f051c8/Services/controller,\
  Tests/mocks

# Coverage: Cobertura XML (sonar-cxx 2.x; lcov converted via lcov_cobertura)
sonar.cxx.cobertura.reportPaths=coverage.xml

# Exclude vendor / generated / HAL code / third-party libraries from analysis
sonar.exclusions=\
  Targets/stm32f051c8/Drivers/**,\
  Targets/stm32f051c8/Middlewares/**,\
  Targets/stm32f051c8/Core/**,\
  Targets/stm32f103ze/**,\
  Tests/mocks/**,\
  Shared/Src/ats/**,\
  Shared/Inc/ats/**,\
  Shared/Src/mbedtls/**,\
  Shared/Inc/mbedtls/**,\
  Shared/Src/nanopb/**,\
  Shared/Inc/nanopb/**,\
  Shared/Inc/display/**,\
  Shared/Src/CryptoEngine.cpp,\
  Shared/Inc/CryptoEngine.hpp,\
  Shared/Src/KeyExchangeManager.cpp,\
  Shared/Inc/KeyExchangeManager.hpp,\
  Shared/Src/uECC.c,\
  Shared/Inc/uECC.h,\
  Shared/Inc/uECC_vli.h,\
  Shared/Src/arcana_cmd.pb.c,\
  Shared/Src/registration.pb.c,\
  Shared/Inc/arcana_cmd.pb.h,\
  Shared/Inc/registration.pb.h,\
  Targets/stm32f051c8/Services/controller/**

# Exclude tests, mocks, and RTOS infrastructure code from coverage metric
sonar.coverage.exclusions=\
  Tests/**,\
  **/mocks/**,\
  **/App.cpp,\
  **/Observable.cpp,\
  **/TimeDisplayService.cpp,\
  **/TimerService.cpp

# Fix: sonarapple plugin claims *.h for ObjC — override to only match ObjC files
sonar.lang.patterns.objc=**/*.m,**/*.mm

sonar.scm.disabled=true
sonar.sourceEncoding=UTF-8
